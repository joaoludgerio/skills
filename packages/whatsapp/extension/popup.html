<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #075e54;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
    .status-row:last-of-type { border-bottom: none; }
    .status-label { color: #555; }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .dot-green { background: #25d366; }
    .dot-red { background: #e74c3c; }
    .dot-yellow { background: #f1c40f; }
    .status-text { font-weight: 500; }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      background: #075e54;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #064e46; }
    .footer {
      margin-top: 10px;
      font-size: 11px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>⚡ Jarvis WA</h1>

  <div class="status-row">
    <span class="status-label">MCP Server</span>
    <span>
      <span id="ws-dot" class="status-dot dot-red"></span>
      <span id="ws-text" class="status-text">Desconectado</span>
    </span>
  </div>

  <div class="status-row">
    <span class="status-label">WhatsApp Web</span>
    <span>
      <span id="wa-dot" class="status-dot dot-red"></span>
      <span id="wa-text" class="status-text">Desconectado</span>
    </span>
  </div>

  <button id="reconnect-btn">Reconectar</button>

  <div class="footer">ws://localhost:3847</div>
  <div class="footer" style="margin-top:4px; color: #bbb;">Desenvolvido pela Expert Integrado</div>

  <script src="popup.js"></script>
</body>
</html>
